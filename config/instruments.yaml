# Instruments to include in the recap email.
#
# Each group becomes a section in the email. Order is preserved.
# `symbol` is a Yahoo Finance ticker.
# `kind` controls how the value is formatted and how change is shown:
#   - fx_jpy : 2 decimals, change in pips (price diff) and %
#   - fx     : 4 decimals, change in pips (price diff) and %
#   - yield  : percent with 2 decimals, change in basis points
#   - index  : comma-separated, 2 decimals, change in absolute and %
#
# To add an instrument, append a row. To remove, delete or comment out.

groups:
  - name: 為替
    instruments:
      - { symbol: "JPY=X",    label: "USD/JPY",  kind: fx_jpy }
      - { symbol: "EURUSD=X", label: "EUR/USD",  kind: fx }
      - { symbol: "GBPUSD=X", label: "GBP/USD",  kind: fx }
      - { symbol: "DX-Y.NYB", label: "DXY",      kind: index }

  - name: 金利
    instruments:
      - { symbol: "^FVX", label: "UST 5Y",  kind: yield }
      - { symbol: "^TNX", label: "UST 10Y", kind: yield }
      - { symbol: "^TYX", label: "UST 30Y", kind: yield }

  - name: コモディティ
    instruments:
      - { symbol: "CL=F", label: "WTI",   kind: index }
      - { symbol: "BZ=F", label: "Brent", kind: index }
      - { symbol: "GC=F", label: "Gold",  kind: index }

  - name: 株価指数
    instruments:
      - { symbol: "^GSPC", label: "S&P 500", kind: index }
      - { symbol: "^IXIC", label: "NASDAQ",  kind: index }
      - { symbol: "^DJI",  label: "Dow",     kind: index }

# Economic calendar source: Forex Factory weekly XML feed.
# Filters events to the next US business day matching `currencies` and `impacts`.
# Set `enabled: false` to skip the calendar section entirely.
calendar:
  enabled: true
  currencies: [USD, EUR, JPY, GBP, CAD]   # G7 currencies (Italy/France/Germany are EUR)
  impacts: [High, Medium]
