name: market-recap

on:
  # Mon-Fri at 22:00 UTC.
  # NY close (16:00 ET) is 21:00 UTC in EDT and 22:00 UTC in EST,
  # so this is roughly 1-2h after close depending on the season.
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print to log instead of sending email"
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run recap
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m recap --dry-run
          else
            python -m recap
          fi
